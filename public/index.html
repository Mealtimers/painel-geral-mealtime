<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meal Time | Painel Geral</title>
  <link rel="icon" href="https://www.mealtime.com.br/mealtime/logo-avatar-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mt-red: #BC2026;
      --mt-red-soft: rgba(188,32,38,0.10);
      --mt-red-glow: rgba(188,32,38,0.25);
      --mt-green: #5CB85C;
      --mt-green-soft: rgba(92,184,92,0.10);
      --mt-dark: #0c0d0f;
      --mt-panel: #141518;
      --mt-card: #1a1b1f;
      --mt-card-hover: #1f2025;
      --surface: rgba(255,255,255,0.035);
      --surface-hover: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --text-primary: #f0f0f0;
      --text-secondary: rgba(255,255,255,0.50);
      --text-tertiary: rgba(255,255,255,0.28);
      --amber: #f59e0b;
      --amber-soft: rgba(245,158,11,0.10);
      --blue: #3b82f6;
      --blue-soft: rgba(59,130,246,0.10);
      --purple: #a78bfa;
      --purple-soft: rgba(139,92,246,0.10);
      --cyan: #22d3ee;
      --cyan-soft: rgba(34,211,238,0.10);
      --r: 12px;
      --r-sm: 8px;
      --sidebar-w: 250px;
    }

    html, body {
      height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text-primary);
      background: var(--mt-dark);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ═══ LAYOUT ═══ */
    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      background: var(--mt-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sb-logo {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 18px 18px 16px;
      border-bottom: 1px solid var(--border);
    }

    .sb-logo img {
      width: 32px; height: 32px;
      border-radius: 8px;
    }

    .sb-logo-text {
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--mt-red), #e04b4b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sb-nav {
      flex: 1;
      overflow-y: auto;
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sb-section-label {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: 0 8px;
      margin-bottom: -6px;
    }

    .sb-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border-radius: var(--r-sm);
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid transparent;
    }

    .sb-item:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
      border-color: var(--border);
    }

    .sb-item-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .sb-item-info { flex: 1; min-width: 0; }

    .sb-item-name {
      font-weight: 600;
      font-size: 0.76rem;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-item-desc {
      font-size: 0.6rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sb-arrow {
      opacity: 0;
      transition: all 0.2s;
      flex-shrink: 0;
      color: var(--text-tertiary);
    }

    .sb-item:hover .sb-arrow {
      opacity: 0.6;
      transform: translateX(2px);
    }

    .sb-sub-wrap {
      padding: 9px 10px;
      border-radius: var(--r-sm);
    }

    .sb-sub-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .sb-subs {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding-left: 40px;
    }

    .sb-sub {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 6px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.68rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .sb-sub:hover {
      background: var(--surface-hover);
      color: var(--text-primary);
    }

    .sb-sub-dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.3;
      flex-shrink: 0;
    }

    .sb-pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mt-green);
      box-shadow: 0 0 6px rgba(92,184,92,0.5);
      flex-shrink: 0;
      margin-left: auto;
    }

    .sb-footer {
      border-top: 1px solid var(--border);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sb-clock {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .sb-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.6rem;
      color: var(--text-tertiary);
    }

    .sb-status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mt-green);
      animation: pulse 2s ease-in-out infinite;
    }

    .sb-logout {
      background: none;
      border: 1px solid transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 5px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .sb-logout:hover {
      color: var(--mt-red);
      background: var(--mt-red-soft);
      border-color: rgba(188,32,38,0.15);
    }

    /* ─── MAIN DASHBOARD ─── */
    .main {
      overflow-y: auto;
      padding: 32px 40px;
      background:
        radial-gradient(ellipse 50% 35% at 50% -5%, rgba(188,32,38,0.06), transparent),
        var(--mt-dark);
    }

    .main-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .dash-header {
      margin-bottom: 30px;
    }

    .dash-greeting {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .dash-date {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* Alert row */
    .dash-alerts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    .d-card {
      background: var(--mt-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 18px 20px;
      transition: border-color 0.3s;
    }

    .d-card:hover { border-color: var(--border-hover); }

    .d-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .d-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .d-title { font-weight: 700; font-size: 0.82rem; }
    .d-sub { font-size: 0.64rem; color: var(--text-tertiary); font-weight: 500; }

    .d-big {
      font-size: 2.2rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 10px;
      font-variant-numeric: tabular-nums;
    }

    .d-head { cursor: pointer; user-select: none; }

    .d-toggle {
      margin-left: auto;
      width: 24px; height: 24px;
      border-radius: 6px;
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
      flex-shrink: 0;
    }

    .d-toggle svg {
      transition: transform 0.25s;
    }

    .d-card.expanded .d-toggle svg {
      transform: rotate(180deg);
    }

    .d-toggle:hover {
      background: rgba(255,255,255,0.08);
    }

    .d-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(.4,0,.2,1), opacity 0.25s;
      opacity: 0;
    }

    .d-card.expanded .d-body {
      max-height: 300px;
      opacity: 1;
    }

    .d-total-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 7px;
      background: rgba(255,255,255,0.04);
      margin-top: 6px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .d-total-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .d-total-val {
      font-size: 0.82rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .d-rows { display: flex; flex-direction: column; gap: 4px; }

    .d-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-radius: 7px;
      background: rgba(255,255,255,0.025);
      transition: background 0.2s;
    }

    .d-row:hover { background: rgba(255,255,255,0.05); }

    .d-row-name {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .d-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .d-row-n {
      font-size: 0.78rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .d-row-val {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-tertiary);
    }

    .d-empty {
      font-size: 0.74rem;
      color: var(--text-tertiary);
      text-align: center;
      padding: 14px;
    }

    .d-load {
      text-align: center;
      padding: 24px 10px;
      color: var(--text-tertiary);
      font-size: 0.74rem;
    }

    /* Newsletter section */
    .dash-nl {
      background: var(--mt-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px 24px;
      margin-bottom: 24px;
    }

    .nl-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .nl-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .nl-icon {
      width: 34px; height: 34px;
      border-radius: 9px;
      background: var(--mt-red-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .nl-title { font-weight: 700; font-size: 0.82rem; }
    .nl-date-label { font-size: 0.64rem; color: var(--text-tertiary); }

    .nl-link {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--mt-red);
      text-decoration: none;
      opacity: 0.5;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.2s;
    }

    .nl-link:hover { opacity: 1; }

    .nl-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .nl-card {
      padding: 14px 16px;
      border-radius: var(--r-sm);
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.04);
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nl-card:hover {
      background: rgba(255,255,255,0.05);
      border-color: var(--border-hover);
    }

    .nl-card-n {
      width: 22px; height: 22px;
      border-radius: 6px;
      background: var(--mt-red-soft);
      color: var(--mt-red);
      font-weight: 800;
      font-size: 0.62rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nl-card-title {
      font-size: 0.76rem;
      font-weight: 600;
      line-height: 1.45;
    }

    .nl-card-desc {
      font-size: 0.68rem;
      line-height: 1.5;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .nl-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .nl-tag {
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.6rem;
      font-weight: 600;
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .nl-load {
      text-align: center;
      padding: 28px;
      color: var(--text-tertiary);
      font-size: 0.74rem;
    }

    /* Verse */
    .dash-verse {
      text-align: center;
      padding: 16px;
      margin-bottom: 16px;
    }

    .verse-text {
      font-size: 0.82rem;
      font-style: italic;
      font-weight: 400;
      line-height: 1.7;
      color: var(--text-tertiary);
      max-width: 550px;
      margin: 0 auto 6px;
    }

    .verse-ref {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--mt-red);
      opacity: 0.4;
      letter-spacing: 0.03em;
    }

    .dash-footer {
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
    }

    /* Icon color classes */
    .i-crm    { background: var(--mt-red-soft); color: #e85d5d; }
    .i-bi     { background: var(--amber-soft); color: #fb923c; }
    .i-dietas { background: var(--mt-green-soft); color: #6dcf6d; }
    .i-ecom   { background: var(--purple-soft); color: var(--purple); }
    .i-fin    { background: var(--blue-soft); color: #60a5fa; }
    .i-meta   { background: var(--cyan-soft); color: var(--cyan); }
    .i-mkt    { background: rgba(250,204,21,0.10); color: #facc15; }
    .i-estoque{ background: rgba(251,146,60,0.10); color: #fb923c; }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .anim { animation: fadeUp 0.4s cubic-bezier(.4,0,.2,1) both; }

    /* Responsive */
    @media (max-width: 900px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        border-right: none;
        border-bottom: 1px solid var(--border);
        max-height: 50vh;
      }
      .main { padding: 24px 18px; }
      .dash-alerts { grid-template-columns: 1fr; }
      .nl-grid { grid-template-columns: 1fr; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  </style>
</head>
<body>

<div class="shell">

  <!-- SIDEBAR MENU -->
  <aside class="sidebar">
    <div class="sb-logo">
      <img src="https://www.mealtime.com.br/mealtime/logo-avatar-192.png" alt="Meal Time">
      <span class="sb-logo-text">Meal Time</span>
    </div>

    <nav class="sb-nav" id="sidebar-nav"></nav>

    <div class="sb-footer">
      <span class="sb-clock" id="clock"></span>
      <div class="sb-status">
        <span class="sb-status-dot"></span>
        Online
      </div>
      <button onclick="logout()" class="sb-logout" title="Sair">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </div>
  </aside>

  <!-- MAIN DASHBOARD -->
  <main class="main">
    <div class="main-inner">

      <div class="dash-header anim">
        <div class="dash-greeting" id="greeting"></div>
        <div class="dash-date" id="dateLabel"></div>
      </div>

      <div class="dash-alerts">
        <div class="d-card anim" id="alertContas" style="animation-delay:.05s">
          <div class="d-load">Carregando contas...</div>
        </div>
        <div class="d-card anim" id="alertPedidos" style="animation-delay:.1s">
          <div class="d-load">Carregando pedidos...</div>
        </div>
      </div>

      <div class="dash-nl anim" id="newsletter" style="animation-delay:.15s">
        <div class="nl-load">Carregando newsletter...</div>
      </div>

      <div class="dash-verse anim" style="animation-delay:.2s">
        <div class="verse-text" id="verseText"></div>
        <div class="verse-ref" id="verseRef"></div>
      </div>

      <div class="dash-footer anim" style="animation-delay:.25s">Meal Time &copy; 2026</div>

    </div>
  </main>

</div>

<script>
  var ar = '<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

  /* ═══ AUTH HELPER ═══ */
  function getToken() {
    return localStorage.getItem('painel_token') || '';
  }

  function authFetch(url) {
    return fetch(url, {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    }).then(function(r) {
      if (r.status === 401) {
        localStorage.removeItem('painel_token');
        document.cookie = 'painel_token=; path=/; max-age=0';
        window.location.href = '/login';
        throw new Error('Sessão expirada');
      }
      return r.json();
    });
  }

  function logout() {
    localStorage.removeItem('painel_token');
    document.cookie = 'painel_token=; path=/; max-age=0';
    window.location.href = '/login';
  }

  /* ═══ GREETING + DATE ═══ */
  (function(){
    var h = new Date().getHours();
    var g = h < 12 ? 'Bom dia' : h < 18 ? 'Boa tarde' : 'Boa noite';
    document.getElementById('greeting').textContent = g + ', Talison';

    var n = new Date();
    var dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sabado'];
    var meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
    document.getElementById('dateLabel').textContent =
      dias[n.getDay()] + ', ' + n.getDate() + ' de ' + meses[n.getMonth()] + ' de ' + n.getFullYear();
  })();

  /* ═══ CLOCK ═══ */
  (function(){
    var el = document.getElementById('clock');
    function t(){
      var n = new Date();
      var hh = String(n.getHours()).padStart(2,'0');
      var mi = String(n.getMinutes()).padStart(2,'0');
      el.textContent = hh + ':' + mi;
    }
    t(); setInterval(t, 30000);
  })();

  /* ═══ SIDEBAR MENU ═══ */
  var SECTIONS = [
    {
      title: 'Dados & Inteligencia',
      apps: [
        { id:'bi', title:'BI Inteligencia', desc:'Fabrica, lojas e KPIs', icon:'📊', ic:'i-bi',
          url:'https://bi-bling-production.up.railway.app/bi.html#vendas' }
      ]
    },
    {
      title: 'Canal de Vendas',
      apps: [
        { id:'meta', title:'Meta Ads', desc:'Campanhas', icon:'📢', ic:'i-meta',
          url:'https://meta-ads-dashboard-production-1f44.up.railway.app' },
        { id:'ecom', title:'E-commerce', desc:'Prefiro Delivery', icon:'🛒', ic:'i-ecom', url:null,
          subs:[
            {l:'Pelotas', u:'https://painel.prefirodelivery.com/pelotas_mealtime'},
            {l:'Santa Maria', u:'https://painel.prefirodelivery.com/santamaria_mealtime'}
          ]},
        { id:'crm', title:'CRM', desc:'Clientes e recompra', icon:'👥', ic:'i-crm',
          url:'https://meal-time-crm-production.up.railway.app/' },
        { id:'mkt', title:'MKT Marketing', desc:'Conteudo e organico', icon:'📋', ic:'i-mkt',
          url:'https://marketing-hub-mealtime-production.up.railway.app' }
      ]
    },
    {
      title: 'Producao',
      apps: [
        { id:'estoque', title:'Estoque Fabrica', desc:'Inventario e producao', icon:'📦', ic:'i-estoque',
          url:'https://estoque-fabrica-mealtime-production.up.railway.app' },
        { id:'dietas', title:'Gerador de Pedidos', desc:'Personalizados e B2B', icon:'🥗', ic:'i-dietas',
          url:'https://charismatic-friendship-production-b81d.up.railway.app/' },
        { id:'fin', title:'Financeiro / ERP', desc:'Bling — contas e NFs', icon:'💰', ic:'i-fin',
          url:'https://www.bling.com.br/inicio#/' }
      ]
    }
  ];

  (function(){
    var nav = document.getElementById('sidebar-nav');

    SECTIONS.forEach(function(sec){
      var label = document.createElement('div');
      label.className = 'sb-section-label';
      label.textContent = sec.title;
      nav.appendChild(label);

      sec.apps.forEach(function(a){
        if(a.subs && a.subs.length){
          var wrap = document.createElement('div');
          wrap.className = 'sb-sub-wrap';
          wrap.innerHTML =
            '<div class="sb-sub-head">'+
              '<div class="sb-item-icon '+a.ic+'">'+a.icon+'</div>'+
              '<div class="sb-item-info"><div class="sb-item-name">'+a.title+'</div><div class="sb-item-desc">'+a.desc+'</div></div>'+
            '</div>';

          var subsDiv = document.createElement('div');
          subsDiv.className = 'sb-subs';
          a.subs.forEach(function(s){
            subsDiv.innerHTML += '<a class="sb-sub" href="'+s.u+'" target="_blank" rel="noopener"><span class="sb-sub-dot"></span>'+s.l+'</a>';
          });
          wrap.appendChild(subsDiv);
          nav.appendChild(wrap);
        } else {
          var item = document.createElement('a');
          item.className = 'sb-item';
          item.href = a.url || '#';
          item.target = '_blank';
          item.rel = 'noopener';
          item.innerHTML =
            '<div class="sb-item-icon '+a.ic+'">'+a.icon+'</div>'+
            '<div class="sb-item-info"><div class="sb-item-name">'+a.title+'</div><div class="sb-item-desc">'+a.desc+'</div></div>'+
            '<div class="sb-pulse"></div>'+
            '<div class="sb-arrow">'+ar+'</div>';
          nav.appendChild(item);
        }
      });
    });
  })();

  var chevronSvg = '<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

  function toggleCard(cardId){
    var el = document.getElementById(cardId);
    el.classList.toggle('expanded');
  }

  /* ═══ CONTAS A PAGAR ═══ */
  function renderContas(){
    authFetch('/api/contas-resumo')
      .then(function(d){
        var el = document.getElementById('alertContas');
        if(d.error){ el.innerHTML='<div class="d-empty">Sem dados</div>'; return; }

        var wasExpanded = el.classList.contains('expanded');
        var bk='', contas=d.porConta||{}, nomes=Object.keys(contas).sort();
        var valores=d.valoresPorConta||{};
        var cores=['#e85d5d','#a78bfa','#60a5fa','#6dcf6d'];

        nomes.forEach(function(n,i){
          var valStr = valores[n] ? ' · R$ '+(valores[n]).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '';
          bk += '<div class="d-row"><span class="d-row-name"><span class="d-dot" style="background:'+cores[i%4]+'"></span>'+n+'</span><span class="d-row-n">'+contas[n]+'<span class="d-row-val">'+valStr+'</span></span></div>';
        });

        if(!nomes.length) bk='<div class="d-empty" style="color:var(--mt-green)">Nenhuma conta hoje</div>';

        var totalVal = (d.valorTotal||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
        var totalRow = d.total > 0 ? '<div class="d-total-row"><span class="d-total-label">Total a pagar</span><span class="d-total-val" style="color:var(--mt-red)">R$ '+totalVal+'</span></div>' : '';

        el.innerHTML =
          '<div class="d-head" onclick="toggleCard(\'alertContas\')"><div class="d-icon" style="background:var(--mt-red-soft);color:var(--mt-red)">📋</div><div><div class="d-title">Contas a Pagar</div><div class="d-sub">Vencimento hoje</div></div><div class="d-toggle">'+chevronSvg+'</div></div>'+
          '<div class="d-big" style="color:var(--mt-red)">'+d.total+'</div>'+
          '<div class="d-body"><div class="d-rows">'+bk+'</div>'+totalRow+'</div>';

        if(wasExpanded) el.classList.add('expanded');
      })
      .catch(function(){ document.getElementById('alertContas').innerHTML='<div class="d-empty">Contas indisponivel</div>'; });
  }

  /* ═══ PEDIDOS DO DIA ═══ */
  function renderPedidos(){
    authFetch('/api/pedidos-resumo')
      .then(function(d){
        var el = document.getElementById('alertPedidos');
        if(d.error){ el.innerHTML='<div class="d-empty">Sem dados</div>'; return; }

        var wasExpanded = el.classList.contains('expanded');
        var val = (d.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2});

        var detalhes = '';
        if(d.porLoja){
          var lojas = Object.keys(d.porLoja).sort();
          var cores=['#6dcf6d','#60a5fa','#a78bfa','#e85d5d'];
          lojas.forEach(function(l,i){
            var loja = d.porLoja[l];
            var lojaVal = (loja.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2});
            detalhes += '<div class="d-row"><span class="d-row-name"><span class="d-dot" style="background:'+cores[i%4]+'"></span>'+l+'</span><span class="d-row-n">'+loja.qtd+' <span class="d-row-val"> · R$ '+lojaVal+'</span></span></div>';
          });
        }

        var totalRow = '<div class="d-total-row"><span class="d-total-label">Total vendido</span><span class="d-total-val" style="color:var(--mt-green)">R$ '+val+'</span></div>';

        el.innerHTML =
          '<div class="d-head" onclick="toggleCard(\'alertPedidos\')"><div class="d-icon" style="background:var(--mt-green-soft);color:var(--mt-green)">📦</div><div><div class="d-title">Pedidos Hoje</div><div class="d-sub">Vendas do dia</div></div><div class="d-toggle">'+chevronSvg+'</div></div>'+
          '<div class="d-big" style="color:var(--mt-green)">'+d.total+'</div>'+
          '<div class="d-body"><div class="d-rows">'+detalhes+'</div>'+totalRow+'</div>';

        if(wasExpanded) el.classList.add('expanded');
      })
      .catch(function(){ document.getElementById('alertPedidos').innerHTML='<div class="d-empty">Pedidos indisponivel</div>'; });
  }

  /* ═══ NEWSLETTER ═══ */
  function renderNewsletter(){
    var el = document.getElementById('newsletter');
    authFetch('/api/newsletter')
      .then(function(d){
        if(d.error) throw new Error(d.error);
        var items=[
          {m:d.manchete1,s:d.resumo1},{m:d.manchete2,s:d.resumo2},{m:d.manchete3,s:d.resumo3}
        ].filter(function(x){return x.m;});
        if(!items.length) throw new Error('vazio');

        var url = d.notionUrl||'#';
        var df = '';
        if(d.data){
          var dt=new Date(d.data+'T12:00:00');
          var ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
          var ms=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
          df=ds[dt.getDay()]+', '+dt.getDate()+' de '+ms[dt.getMonth()]+' de '+dt.getFullYear();
        }

        var cards='';
        items.forEach(function(it,i){
          var desc=it.s?'<div class="nl-card-desc">'+it.s+'</div>':'';
          cards+='<a class="nl-card" href="'+url+'" target="_blank" rel="noopener">'+
            '<div class="nl-card-n">'+(i+1)+'</div>'+
            '<div class="nl-card-title">'+it.m+'</div>'+desc+'</a>';
        });

        var tg='';
        if(d.topicos&&d.topicos.length){
          tg='<div class="nl-tags">';
          d.topicos.forEach(function(t){ tg+='<span class="nl-tag">'+t+'</span>'; });
          tg+='</div>';
        }

        var ft='';
        if(d.notionUrl){
          ft='<a class="nl-link" href="'+d.notionUrl+'" target="_blank" rel="noopener">Ler completa '+ar+'</a>';
        }

        el.innerHTML=
          '<div class="nl-header"><div class="nl-header-left"><div class="nl-icon">📰</div><div><div class="nl-title">Newsletter</div><div class="nl-date-label">'+df+'</div></div></div>'+ft+'</div>'+
          '<div class="nl-grid">'+cards+'</div>'+tg;
      })
      .catch(function(){ el.innerHTML='<div class="nl-load">Newsletter indisponivel</div>'; });
  }

  /* ═══ VERSICULO DO DIA ═══ */
  var VERSES = [
    { t: 'Porque eu bem sei os pensamentos que penso de vos, diz o Senhor; pensamentos de paz e nao de mal, para vos dar o fim que esperais.', r: 'Jeremias 29:11' },
    { t: 'Tudo posso naquele que me fortalece.', r: 'Filipenses 4:13' },
    { t: 'Confia no Senhor de todo o teu coracao e nao te estribes no teu proprio entendimento.', r: 'Proverbios 3:5' },
    { t: 'O Senhor e o meu pastor; nada me faltara.', r: 'Salmos 23:1' },
    { t: 'Mas os que esperam no Senhor renovarao as suas forcas; subirao com asas como aguias.', r: 'Isaias 40:31' },
    { t: 'Entrega o teu caminho ao Senhor; confia nele, e ele tudo fara.', r: 'Salmos 37:5' },
    { t: 'Nao temas, porque eu sou contigo; nao te assombres, porque eu sou teu Deus.', r: 'Isaias 41:10' },
    { t: 'Sede fortes e corajosos. Nao temais, pois o Senhor, o seu Deus, vai com voces.', r: 'Deuteronomio 31:6' },
    { t: 'Deleita-te tambem no Senhor, e ele te concedera o que deseja o teu coracao.', r: 'Salmos 37:4' },
    { t: 'E sabemos que todas as coisas contribuem juntamente para o bem daqueles que amam a Deus.', r: 'Romanos 8:28' },
    { t: 'Bem-aventurado o homem que confia no Senhor, e cuja esperanca e o Senhor.', r: 'Jeremias 17:7' },
    { t: 'Alegrai-vos sempre no Senhor; outra vez digo: alegrai-vos.', r: 'Filipenses 4:4' },
    { t: 'O Senhor e a minha luz e a minha salvacao; a quem temerei?', r: 'Salmos 27:1' },
    { t: 'Buscai primeiro o Reino de Deus e a sua justica, e todas essas coisas vos serao acrescentadas.', r: 'Mateus 6:33' },
    { t: 'Se Deus e por nos, quem sera contra nos?', r: 'Romanos 8:31' },
    { t: 'Toda boa dadiva e todo dom perfeito vem do alto, descendo do Pai das luzes.', r: 'Tiago 1:17' },
    { t: 'O fruto do Espirito e: amor, alegria, paz, paciencia, amabilidade, bondade, fidelidade.', r: 'Galatas 5:22' },
    { t: 'Clama a mim, e responder-te-ei, e anunciar-te-ei coisas grandes e firmes, que nao sabes.', r: 'Jeremias 33:3' }
  ];

  (function(){
    var now = new Date();
    var start = new Date(now.getFullYear(), 0, 0);
    var dayOfYear = Math.floor((now - start) / 86400000);
    var v = VERSES[dayOfYear % VERSES.length];
    document.getElementById('verseText').textContent = '“' + v.t + '”';
    document.getElementById('verseRef').textContent = v.r;
  })();

  /* ═══ INIT + AUTO-REFRESH 2min ═══ */
  renderContas();
  renderPedidos();
  renderNewsletter();
  setInterval(function(){ renderContas(); renderPedidos(); renderNewsletter(); }, 2*60*1000);
</script>
