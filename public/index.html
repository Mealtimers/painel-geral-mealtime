<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meal Time | Painel Geral</title>
  <link rel="icon" href="https://www.mealtime.com.br/mealtime/logo-avatar-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mt-red: #BC2026;
      --mt-red-soft: rgba(188,32,38,0.10);
      --mt-red-glow: rgba(188,32,38,0.25);
      --mt-green: #5CB85C;
      --mt-green-soft: rgba(92,184,92,0.10);
      --mt-dark: #111214;
      --mt-panel: #18191c;
      --mt-card: #1e2024;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.14);
      --text-primary: #f0f0f0;
      --text-secondary: rgba(255,255,255,0.50);
      --text-tertiary: rgba(255,255,255,0.28);
      --amber: #f59e0b;
      --amber-soft: rgba(245,158,11,0.10);
      --blue: #3b82f6;
      --blue-soft: rgba(59,130,246,0.10);
      --purple: #a78bfa;
      --purple-soft: rgba(139,92,246,0.10);
      --cyan: #22d3ee;
      --cyan-soft: rgba(34,211,238,0.10);
      --r: 12px;
      --r-sm: 8px;
    }

    html, body {
      height: 100%;
      font-family: "Inter", "Google Sans", system-ui, sans-serif;
      color: var(--text-primary);
      background: var(--mt-dark);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ═══ COCKPIT 3-COL ═══ */
    .cockpit {
      display: grid;
      grid-template-columns: 240px 1fr 300px;
      grid-template-rows: auto 1fr;
      height: 100vh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px;
      background: var(--mt-panel);
      border-bottom: 1px solid var(--border);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar-logo-img {
      width: 30px;
      height: 30px;
      border-radius: 7px;
    }

    .topbar-brand {
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--mt-red), #e04b4b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .topbar-sep {
      width: 1px;
      height: 16px;
      background: var(--border);
    }

    .topbar-label {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      font-weight: 500;
      letter-spacing: 0.04em;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .topbar-clock {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      font-variant-numeric: tabular-nums;
    }

    .topbar-pulse {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--mt-green);
      box-shadow: 0 0 8px rgba(92,184,92,0.6);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    /* ─── SIDEBAR LEFT ─── */
    .side-left {
      background: var(--mt-panel);
      border-right: 1px solid var(--border);
      padding: 20px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .side-label {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    /* Alert cards */
    .a-card {
      background: var(--mt-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 12px;
      transition: border-color 0.3s;
    }

    .a-card:hover { border-color: var(--border-hover); }

    .a-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 0;
    }

    .a-icon {
      width: 26px; height: 26px;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.78rem;
    }

    .a-title { font-weight: 700; font-size: 0.72rem; }
    .a-sub { font-size: 0.58rem; color: var(--text-tertiary); font-weight: 500; }

    .a-big {
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }

    .a-unit {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--text-tertiary);
      margin-left: 3px;
    }

    .a-rows { display: flex; flex-direction: column; gap: 3px; }

    .a-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px;
      border-radius: 5px;
      background: rgba(255,255,255,0.025);
      transition: background 0.2s;
    }

    .a-row:hover { background: rgba(255,255,255,0.05); }

    .a-row-name {
      font-size: 0.64rem;
      font-weight: 500;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .a-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .a-row-n {
      font-size: 0.72rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .a-empty {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      text-align: center;
      padding: 10px;
    }

    .a-load {
      text-align: center;
      padding: 20px 10px;
      color: var(--text-tertiary);
      font-size: 0.7rem;
    }

    .a-valor {
      font-size: 0.62rem;
      color: var(--text-tertiary);
      margin-top: -4px;
    }

    /* Number badge — hidden when collapsed */
    .a-num {
      margin-left: auto;
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--text-primary);
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.3s cubic-bezier(.4,0,.2,1), transform 0.3s cubic-bezier(.4,0,.2,1);
    }

    .a-card.open .a-num {
      opacity: 1;
      transform: scale(1);
    }

    /* Collapsible body */
    .a-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s cubic-bezier(.4,0,.2,1);
    }

    .a-card.open .a-body {
      max-height: 300px;
    }

    .a-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 0 0;
      cursor: pointer;
      border: none;
      background: none;
      width: 100%;
    }

    .a-toggle svg {
      width: 14px;
      height: 14px;
      color: var(--text-tertiary);
      transition: transform 0.3s cubic-bezier(.4,0,.2,1);
    }

    .a-card.open .a-toggle svg {
      transform: rotate(180deg);
    }

    .a-toggle:hover svg {
      color: var(--text-secondary);
    }

    /* ─── CENTER ─── */
    .center {
      padding: 28px 36px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 60% 45% at 50% -5%, var(--mt-red-soft), transparent),
        var(--mt-dark);
    }

    .center-wrap { width: 100%; max-width: 780px; }

    .center-sub {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 28px;
      font-weight: 500;
    }

    /* App grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .app {
      background: var(--mt-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 22px 18px;
      text-decoration: none;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      gap: 10px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(.4,0,.2,1);
      animation: fadeUp 0.4s cubic-bezier(.4,0,.2,1) both;
    }

    .app:nth-child(1){animation-delay:.03s}
    .app:nth-child(2){animation-delay:.06s}
    .app:nth-child(3){animation-delay:.09s}
    .app:nth-child(4){animation-delay:.12s}
    .app:nth-child(5){animation-delay:.15s}

    .app:hover {
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px var(--border-hover);
    }

    .app-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-icon {
      width: 42px; height: 42px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
    }

    .app-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--mt-green);
      box-shadow: 0 0 6px rgba(92,184,92,0.5);
    }

    .app-name { font-weight: 700; font-size: 0.92rem; }
    .app-desc { font-size: 0.74rem; color: var(--text-secondary); line-height: 1.5; }

    .app-go {
      margin-top: auto;
      padding-top: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--mt-red);
      opacity: 0.5;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.2s;
    }

    .app:hover .app-go { opacity: 1; }
    .app:hover .app-go svg { transform: translateX(3px); }
    .app-go svg { width: 10px; height: 10px; transition: transform 0.2s; }

    .i-crm   { background: var(--mt-red-soft); color: #e85d5d; }
    .i-bi    { background: var(--amber-soft); color: #fb923c; }
    .i-dietas{ background: var(--mt-green-soft); color: #6dcf6d; }
    .i-ecom  { background: var(--purple-soft); color: var(--purple); }
    .i-fin   { background: var(--blue-soft); color: #60a5fa; }
    .i-meta  { background: var(--cyan-soft); color: var(--cyan); }
    .i-mkt   { background: rgba(250,204,21,0.10); color: #facc15; }
    .i-estoque { background: rgba(251,146,60,0.10); color: #fb923c; }

    /* Seções de categoria */
    .section-block { margin-bottom: 22px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 0 2px;
    }
    .section-icon {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .section-icon.si-lojas  { background: rgba(168,85,247,0.12); color: #a855f7; }
    .section-icon.si-fabrica { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .section-icon.si-bi      { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .section-title-text {
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .app.coming-soon {
      opacity: 0.4;
      pointer-events: none;
      cursor: default;
    }
    .app.coming-soon .app-go { display: none; }
    .coming-badge {
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--text-secondary);
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
      margin-top: auto;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Sublinks */
    .subs { display: flex; flex-direction: column; gap: 4px; margin-top: 2px; }

    .sub {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 6px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.68rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .sub:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.1); }
    .sub .sd { width: 5px; height: 5px; border-radius: 50%; background: currentColor; opacity: 0.3; }
    .sub .sa { margin-left: auto; opacity: 0.25; transition: all 0.2s; }
    .sub:hover .sa { transform: translateX(2px); opacity: 0.5; }

    /* Versículo — discreto */
    .verse-section {
      margin-top: 28px;
      text-align: center;
      padding: 12px 16px;
      animation: fadeUp 0.5s cubic-bezier(.4,0,.2,1) 0.22s both;
    }

    .verse-text {
      font-family: "Google Sans", "Inter", serif;
      font-size: 0.76rem;
      font-style: italic;
      font-weight: 400;
      line-height: 1.6;
      color: var(--text-tertiary);
      max-width: 500px;
      margin: 0 auto 6px;
    }

    .verse-ref {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--mt-red);
      opacity: 0.45;
      letter-spacing: 0.03em;
    }

    .footer {
      text-align: center;
      margin-top: 20px;
      color: var(--text-tertiary);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
    }

    /* ─── SIDEBAR RIGHT ─── */
    .side-right {
      background: var(--mt-panel);
      border-left: 1px solid var(--border);
      padding: 18px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .nl-head {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 4px;
    }

    .nl-icon {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: var(--mt-red-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }

    .nl-label {
      font-weight: 800;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .nl-date {
      font-size: 0.62rem;
      color: var(--text-tertiary);
      margin-bottom: 14px;
    }

    .nl-items { display: flex; flex-direction: column; gap: 3px; }

    .nl-item {
      display: flex;
      gap: 9px;
      align-items: flex-start;
      padding: 11px 9px;
      border-radius: var(--r-sm);
      transition: background 0.2s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .nl-item:hover { background: var(--surface-hover); }

    .nl-n {
      flex-shrink: 0;
      width: 20px; height: 20px;
      border-radius: 5px;
      background: var(--mt-red-soft);
      color: var(--mt-red);
      font-weight: 800;
      font-size: 0.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .nl-c { flex: 1; min-width: 0; }

    .nl-t {
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1.45;
      margin-bottom: 3px;
    }

    .nl-s {
      font-size: 0.66rem;
      line-height: 1.5;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .nl-more {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--mt-red);
      opacity: 0;
      margin-top: 4px;
      transition: opacity 0.2s;
    }

    .nl-item:hover .nl-more { opacity: 0.7; }

    .nl-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .nl-tag {
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 0.58rem;
      font-weight: 600;
      background: rgba(255,255,255,0.03);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.05);
    }

    .nl-foot { margin-top: 10px; text-align: right; }

    .nl-link {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--mt-red);
      text-decoration: none;
      opacity: 0.5;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.2s;
    }

    .nl-link:hover { opacity: 1; }

    .nl-load {
      text-align: center;
      padding: 28px;
      color: var(--text-tertiary);
      font-size: 0.7rem;
    }

    /* ─── ANIM ─── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 1100px) {
      .cockpit {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto 1fr auto;
        overflow-y: auto;
      }
      html, body { overflow: auto; }
      .side-left {
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex-direction: row;
        flex-wrap: wrap;
      }
      .side-left .side-label { width: 100%; }
      .side-left .a-card { flex: 1; min-width: 200px; }
      .side-right { border-left: none; border-top: 1px solid var(--border); }
      .center { padding: 22px 18px; }
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr 1fr; gap: 9px; }
    }

    /* scrollbar sutil */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  </style>
</head>
<body>

<div class="cockpit">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <img src="https://www.mealtime.com.br/mealtime/logo-avatar-192.png" alt="Meal Time" class="topbar-logo-img">
      <span class="topbar-brand">Meal Time</span>
      <span class="topbar-sep"></span>
      <span class="topbar-label">Painel de Controle</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-clock" id="clock"></span>
      <span class="topbar-pulse"></span>
    </div>
  </div>

  <!-- SIDEBAR ESQUERDA -->
  <div class="side-left">
    <div class="side-label">Alertas do dia</div>
    <div class="a-card" id="alertContas">
      <div class="a-load">Carregando contas...</div>
    </div>
    <div class="a-card" id="alertPedidos">
      <div class="a-load">Carregando pedidos...</div>
    </div>
  </div>

  <!-- CENTRO -->
  <div class="center">
    <div class="center-wrap">
      <div class="center-sub">Selecione o sistema</div>
      <div class="grid" id="grid"></div>

      <div class="verse-section" id="verse">
        <div class="verse-text" id="verseText"></div>
        <div class="verse-ref" id="verseRef"></div>
      </div>

      <div class="footer">Meal Time &copy; 2026</div>
    </div>
  </div>

  <!-- SIDEBAR DIREITA -->
  <div class="side-right" id="newsletter">
    <div class="nl-load">Carregando newsletter...</div>
  </div>

</div>

<script>
  /* ═══ RELÓGIO ═══ */
  (function(){
    var el = document.getElementById('clock');
    function t(){
      var n = new Date();
      var d = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'][n.getDay()];
      var dd = String(n.getDate()).padStart(2,'0');
      var mm = String(n.getMonth()+1).padStart(2,'0');
      var hh = String(n.getHours()).padStart(2,'0');
      var mi = String(n.getMinutes()).padStart(2,'0');
      el.textContent = d+' '+dd+'/'+mm+'  '+hh+':'+mi;
    }
    t(); setInterval(t, 30000);
  })();

  /* ═══ APPS POR SEÇÃO ═══ */
  var SECTIONS = [
    {
      title: 'Canal de Vendas',
      icon: '🛍️',
      iconClass: 'si-lojas',
      apps: [
        { id:'meta', title:'Meta Ads', desc:'Campanhas e performance.', icon:'📢', ic:'i-meta',
          url:'https://meta-ads-dashboard-production-1f44.up.railway.app' },
        { id:'ecom', title:'E-commerce', desc:'Prefiro Delivery.', icon:'🛒', ic:'i-ecom', url:null,
          subs:[
            {l:'Pelotas', u:'https://painel.prefirodelivery.com/pelotas_mealtime'},
            {l:'Santa Maria', u:'https://painel.prefirodelivery.com/santamaria_mealtime'}
          ]},
        { id:'crm', title:'CRM', desc:'Clientes e recompra.', icon:'👥', ic:'i-crm',
          url:'https://meal-time-crm-production.up.railway.app/' },
        { id:'mkt', title:'MKT — Marketing', desc:'Conteúdo e orgânico.', icon:'📋', ic:'i-mkt',

  var g = document.getElementById('grid');
  var ar = '<svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

  SECTIONS.forEach(function(sec){
    var block = document.createElement('div');
    block.className = 'section-block';
    block.innerHTML = '<div class="section-header"><div class="section-icon '+sec.iconClass+'">'+sec.icon+'</div><span class="section-title-text">'+sec.title+'</span><div class="section-line"></div></div>';

    var gridDiv = document.createElement('div');
    gridDiv.className = 'grid';

    sec.apps.forEach(function(a){
      var hs = a.subs && a.subs.length;
      var c = document.createElement(hs ? 'div' : 'a');
      c.className = 'app' + (a.comingSoon ? ' coming-soon' : '');
      if(!hs && !a.comingSoon){
        c.href = a.url || '#';
        c.target = '_blank';
        c.rel = 'noopener';
        if(!a.url) c.addEventListener('click', function(e){ e.preventDefault(); });
      }
      var h = '<div class="app-top"><div class="app-icon '+a.ic+'">'+a.icon+'</div>'+(a.comingSoon?'':'<div class="app-dot"></div>')+'</div>'+
        '<div class="app-name">'+a.title+'</div><div class="app-desc">'+a.desc+'</div>';
      if(a.comingSoon){
        h += '<div class="coming-badge">Em breve</div>';
      } else if(hs){
        h += '<div class="subs">';
        a.subs.forEach(function(s){
          h += '<a class="sub" href="'+s.u+'" target="_blank" rel="noopener"><span class="sd"></span>'+s.l+'<span class="sa">'+ar+'</span></a>';
        });
        h += '</div>';
      } else {
        h += '<div class="app-go">Acessar '+ar+'</div>';
      }
      c.innerHTML = h;
      gridDiv.appendChild(c);
    });

    block.appendChild(gridDiv);
    g.appendChild(block);
  });

  /* ═══ VERSÍCULO DO DIA ═══ */

  (function(){
    var now = new Date();
    var start = new Date(now.getFullYear(), 0, 0);
    var dayOfYear = Math.floor((now - start) / 86400000);
    var v = VERSES[dayOfYear % VERSES.length];
    document.getElementById('verseText').textContent = '\u201C' + v.t + '\u201D';
    document.getElementById('verseRef').textContent = v.r;
  })();

  /* ═══ TOGGLE HELPER ═══ */
  var chevronSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

  function toggleCard(cardId) {
    var card = document.getElementById(cardId);
    card.classList.toggle('open');
  }

  /* ═══ CONTAS A PAGAR ═══ */
  function renderContas(){
    fetch('/api/contas-resumo')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var el = document.getElementById('alertContas');
        if(d.error){ el.innerHTML='<div class="a-empty">Sem dados</div>'; return; }

        var bk='', contas=d.porConta||{}, nomes=Object.keys(contas).sort();
        var cores=['#e85d5d','#a78bfa','#60a5fa','#6dcf6d'];

        nomes.forEach(function(n,i){
          bk += '<div class="a-row"><span class="a-row-name"><span class="a-dot" style="background:'+cores[i%4]+'"></span>'+n+'</span><span class="a-row-n">'+contas[n]+'</span></div>';
        });

        if(!nomes.length) bk='<div class="a-empty" style="color:var(--mt-green)">Nenhuma conta hoje</div>';

        el.innerHTML =
          '<div class="a-head"><div class="a-icon" style="background:var(--mt-red-soft);color:var(--mt-red)">\u{1F4CB}</div><div><div class="a-title">Contas a Pagar</div><div class="a-sub">Vencimento hoje</div></div><div class="a-num">'+d.total+'</div></div>'+
          '<div class="a-body"><div class="a-rows" style="margin-top:8px">'+bk+'</div></div>'+
          '<button class="a-toggle" onclick="toggleCard(\'alertContas\')">'+chevronSvg+'</button>';
      })
      .catch(function(){ document.getElementById('alertContas').innerHTML='<div class="a-empty">Contas indisponível</div>'; });
  }

  /* ═══ PEDIDOS DO DIA ═══ */
  function renderPedidos(){
    fetch('/api/pedidos-resumo')
      .then(function(r){ return r.json(); })
      .then(function(d){
        var el = document.getElementById('alertPedidos');
        if(d.error){ el.innerHTML='<div class="a-empty">Sem dados</div>'; return; }
        var val = d.valor ? ' <span style="font-size:0.58rem;color:var(--text-tertiary);font-weight:400">R$ '+d.valor.toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span>' : '';

        el.innerHTML =
          '<div class="a-head"><div class="a-icon" style="background:var(--mt-green-soft);color:var(--mt-green)">\u{1F4E6}</div><div><div class="a-title">Pedidos Hoje</div><div class="a-sub">Vendas do dia</div></div><div class="a-num">'+d.total+'</div></div>'+
          '<div class="a-body"><div style="margin-top:8px"><div class="a-row"><span class="a-row-name">Total vendido</span><span class="a-row-n" style="font-size:0.68rem">R$ '+(d.valor||0).toLocaleString('pt-BR',{minimumFractionDigits:2})+'</span></div></div></div>'+
          '<button class="a-toggle" onclick="toggleCard(\'alertPedidos\')">'+chevronSvg+'</button>';
      })
      .catch(function(){ document.getElementById('alertPedidos').innerHTML='<div class="a-empty">Pedidos indisponível</div>'; });
  }

  /* ═══ NEWSLETTER ═══ */
  function renderNewsletter(){
    var el = document.getElementById('newsletter');
    fetch('/api/newsletter')
      .then(function(r){ return r.json(); })
      .then(function(d){
        if(d.error) throw new Error(d.error);
        var items=[
          {m:d.manchete1,s:d.resumo1},{m:d.manchete2,s:d.resumo2},{m:d.manchete3,s:d.resumo3}
        ].filter(function(x){return x.m;});
        if(!items.length) throw new Error('vazio');

        var url = d.notionUrl||'#';
        var df = '';
        if(d.data){
          var dt=new Date(d.data+'T12:00:00');
          var ds=['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];
          var ms=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
          df=ds[dt.getDay()]+', '+dt.getDate()+' de '+ms[dt.getMonth()]+' de '+dt.getFullYear();
        }

        var hh='';
        items.forEach(function(it,i){
          var rs=it.s?'<div class="nl-s">'+it.s+'</div>':'';
          hh+='<a class="nl-item" href="'+url+'" target="_blank" rel="noopener">'+
            '<div class="nl-n">'+(i+1)+'</div>'+
            '<div class="nl-c"><div class="nl-t">'+it.m+'</div>'+rs+
            '<div class="nl-more">Ler matéria '+ar+'</div></div></a>';
        });

        var tg='';
        if(d.topicos&&d.topicos.length){
          tg='<div class="nl-tags">';
          d.topicos.forEach(function(t){ tg+='<span class="nl-tag">'+t+'</span>'; });
          tg+='</div>';
        }

        var ft='';
        if(d.notionUrl){
          ft='<div class="nl-foot"><a class="nl-link" href="'+d.notionUrl+'" target="_blank" rel="noopener">Ler completa '+ar+'</a></div>';
        }

        el.innerHTML=
          '<div class="nl-head"><div class="nl-icon">\u{1F4F0}</div><span class="nl-label">Newsletter</span></div>'+
          '<div class="nl-date">'+df+'</div>'+
          '<div class="nl-items">'+hh+'</div>'+tg+ft;
      })
      .catch(function(){ el.innerHTML='<div class="nl-load">Newsletter indisponível</div>'; });
  }

  /* ═══ INIT + AUTO-REFRESH 2min ═══ */
  renderContas();
  renderPedidos();
  renderNewsletter();
  setInterval(function(){ renderContas(); renderPedidos(); renderNewsletter(); }, 2*60*1000);
</script>
