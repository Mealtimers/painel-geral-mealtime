<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Meal Time | Painel Geral</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base: #0a0a0a;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --text-primary: #f5f5f5;
      --text-secondary: rgba(255,255,255,0.45);
      --text-tertiary: rgba(255,255,255,0.3);
      --accent: #ef4444;
      --accent-glow: rgba(239,68,68,0.15);
      --radius: 14px;
      --radius-sm: 10px;
    }

    html, body {
      min-height: 100vh;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg-base);
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(239,68,68,0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(127,29,29,0.10), transparent);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .hub {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      max-width: 820px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .hub-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .hub-brand {
      font-weight: 900;
      font-size: 1.5rem;
      color: var(--text-primary);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .hub-divider {
      width: 32px;
      height: 2px;
      background: var(--accent);
      margin: 12px auto;
      border-radius: 1px;
    }

    .hub-subtitle {
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    /* ── Grid ── */
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      width: 100%;
    }

    /* ── Card ── */
    .hub-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
      text-decoration: none;
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      cursor: pointer;
    }

    .hub-card:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px var(--border-hover);
    }

    .hub-card:active {
      transform: translateY(-1px);
    }

    /* ── Card top row: icon + status ── */
    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .card-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px rgba(34,197,94,0.5);
    }
    .card-status.config {
      background: #f59e0b;
      box-shadow: 0 0 6px rgba(245,158,11,0.4);
    }
    .card-status.offline {
      background: #64748b;
      box-shadow: none;
    }

    .card-title {
      font-weight: 700;
      font-size: 0.92rem;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.45;
      font-weight: 400;
    }

    .card-action {
      margin-top: auto;
      padding-top: 6px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--accent);
      opacity: 0.7;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.2s;
    }

    .hub-card:hover .card-action {
      opacity: 1;
    }

    .card-action svg {
      width: 12px;
      height: 12px;
      transition: transform 0.2s;
    }

    .hub-card:hover .card-action svg {
      transform: translateX(3px);
    }

    /* ── Icon colors ── */
    .icon-crm    { background: rgba(239,68,68,0.15); color: #f87171; }
    .icon-bi     { background: rgba(249,115,22,0.15); color: #fb923c; }
    .icon-dietas { background: rgba(34,197,94,0.15); color: #4ade80; }
    .icon-ecom   { background: rgba(139,92,246,0.15); color: #a78bfa; }
    .icon-financ { background: rgba(59,130,246,0.15); color: #60a5fa; }

    /* ── Sub-links ── */
    .card-sublinks {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 2px;
    }

    .card-sublink {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .card-sublink:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.14);
    }

    .card-sublink .sub-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.35;
      flex-shrink: 0;
    }

    .card-sublink .sub-arrow {
      margin-left: auto;
      opacity: 0.3;
      transition: all 0.2s;
    }

    .card-sublink:hover .sub-arrow {
      transform: translateX(2px);
      opacity: 0.6;
    }

    /* ── Newsletter ── */
    .newsletter {
      width: 100%;
      margin-top: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 22px;
      animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.28s both;
    }

    .newsletter-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
    }

    .newsletter-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .newsletter-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(239,68,68,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
    }

    .newsletter-label {
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-primary);
    }

    .newsletter-date {
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-weight: 500;
    }

    .newsletter-headlines {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .headline-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
    }

    .headline-num {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: rgba(239,68,68,0.1);
      color: var(--accent);
      font-weight: 800;
      font-size: 0.72rem;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .headline-text {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .newsletter-topics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .topic-tag {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.06);
      letter-spacing: 0.02em;
    }

    .newsletter-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 14px;
    }

    .newsletter-link {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      opacity: 0.7;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.2s;
    }

    .newsletter-link:hover {
      opacity: 1;
    }

    .newsletter-loading {
      text-align: center;
      padding: 16px;
      color: var(--text-tertiary);
      font-size: 0.78rem;
    }

    .newsletter-loading .dot-pulse {
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    @media (max-width: 460px) {
      .newsletter { padding: 18px 16px; }
      .newsletter-header { flex-direction: column; align-items: flex-start; gap: 6px; }
    }

    /* ── Footer ── */
    .hub-footer {
      margin-top: 40px;
      text-align: center;
      color: var(--text-tertiary);
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.06em;
    }

    /* ── Responsivo ── */
    @media (max-width: 700px) {
      .hub-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
    }

    @media (max-width: 460px) {
      .hub-grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .hub { padding: 24px 16px; }
      .hub-brand { font-size: 1.3rem; }
    }

    /* ── Animação ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hub-card {
      animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .hub-card:nth-child(1) { animation-delay: 0.04s; }
    .hub-card:nth-child(2) { animation-delay: 0.08s; }
    .hub-card:nth-child(3) { animation-delay: 0.12s; }
    .hub-card:nth-child(4) { animation-delay: 0.16s; }
    .hub-card:nth-child(5) { animation-delay: 0.20s; }

    .hub-header {
      animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
  </style>
</head>
<body>

<div class="hub">

  <header class="hub-header">
    <div class="hub-brand">Meal Time</div>
    <div class="hub-divider"></div>
    <div class="hub-subtitle">Selecione o sistema que deseja acessar</div>
  </header>

  <div class="hub-grid" id="hubGrid"></div>

  <section class="newsletter" id="newsletter">
    <div class="newsletter-loading">
      <span class="dot-pulse">Carregando newsletter do dia...</span>
    </div>
  </section>

  <footer class="hub-footer">
    Meal Time &copy; 2026
  </footer>

</div>

<script>
  // ╔══════════════════════════════════════════════════════════════╗
  // ║  CONFIGURAÇÃO DOS APPS                                      ║
  // ║  Edite apenas as URLs abaixo para conectar cada sistema.    ║
  // ║  Cada sistema tem seu próprio login independente.           ║
  // ╚══════════════════════════════════════════════════════════════╝

  const APPS = [
    {
      id: 'crm',
      title: 'CRM',
      desc: 'Clientes, leads e pipeline de vendas.',
      icon: '👥',
      iconClass: 'icon-crm',
      url: 'https://meal-time-crm-production.up.railway.app/',
      status: 'online'
    },
    {
      id: 'bi',
      title: 'BI ERP',
      desc: 'Pedidos, faturamento e analytics Bling.',
      icon: '📊',
      iconClass: 'icon-bi',
      url: 'https://bi-bling-production.up.railway.app/bi.html#vendas',
      status: 'online'
    },
    {
      id: 'dietas',
      title: 'Gerador de Pedidos Personalizados',
      desc: 'Cardápios, pedidos e ordens de produção.',
      icon: '🥗',
      iconClass: 'icon-dietas',
      url: 'https://charismatic-friendship-production-b81d.up.railway.app/',
      status: 'online'
    },
    {
      id: 'ecommerce',
      title: 'E-commerce',
      desc: 'Prefiro Delivery — pedidos e operação.',
      icon: '🛒',
      iconClass: 'icon-ecom',
      url: null,
      status: 'online',
      sublinks: [
        { label: 'Pelotas', url: 'https://painel.prefirodelivery.com/pelotas_mealtime' },
        { label: 'Santa Maria', url: 'https://painel.prefirodelivery.com/santamaria_mealtime' }
      ]
    },
    {
      id: 'financeiro',
      title: 'Financeiro / ERP',
      desc: 'Bling — contas, NFs e fluxo de caixa.',
      icon: '💰',
      iconClass: 'icon-financ',
      url: 'https://www.bling.com.br/inicio#/',
      status: 'online'
    }
  ];

  const grid = document.getElementById('hubGrid');
  const arrow = '<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';

  APPS.forEach(function(app) {
    var hasSublinks = app.sublinks && app.sublinks.length > 0;
    var card = document.createElement(hasSublinks ? 'div' : 'a');
    card.className = 'hub-card';
    card.setAttribute('data-app', app.id);

    if (!hasSublinks) {
      card.href = app.url || '#';
      card.target = '_blank';
      card.rel = 'noopener';
      if (!app.url || app.url === '#') {
        card.removeAttribute('target');
        card.addEventListener('click', function(e) {
          e.preventDefault();
          alert('O sistema "' + app.title + '" ainda não foi configurado.\n\nEdite a URL no arquivo index.html para conectar.');
        });
      }
    }

    var h = '' +
      '<div class="card-top">' +
        '<div class="card-icon ' + app.iconClass + '">' + app.icon + '</div>' +
        '<div class="card-status ' + (app.status === 'online' ? '' : app.status) + '"></div>' +
      '</div>' +
      '<div class="card-title">' + app.title + '</div>' +
      '<div class="card-desc">' + app.desc + '</div>';

    if (hasSublinks) {
      h += '<div class="card-sublinks">';
      app.sublinks.forEach(function(sub) {
        h += '<a class="card-sublink" href="' + sub.url + '" target="_blank" rel="noopener">' +
          '<span class="sub-dot"></span>' + sub.label +
          '<span class="sub-arrow">' + arrow + '</span></a>';
      });
      h += '</div>';
    } else {
      h += '<div class="card-action">Acessar ' + arrow + '</div>';
    }

    card.innerHTML = h;
    grid.appendChild(card);
  });

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  NEWSLETTER DO DIA — puxa do Notion via /api/newsletter    ║
  // ╚══════════════════════════════════════════════════════════════╝

  (function loadNewsletter() {
    var el = document.getElementById('newsletter');

    fetch('/api/newsletter')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.error) throw new Error(data.error);

        var manchetes = [data.manchete1, data.manchete2, data.manchete3].filter(Boolean);
        if (manchetes.length === 0) throw new Error('Sem manchetes');

        var dataFormatada = '';
        if (data.data) {
          var d = new Date(data.data + 'T12:00:00');
          var dias = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
          var meses = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
          dataFormatada = dias[d.getDay()] + ', ' + d.getDate() + ' de ' + meses[d.getMonth()] + ' de ' + d.getFullYear();
        }

        var headlinesHtml = '';
        manchetes.forEach(function(m, i) {
          headlinesHtml +=
            '<div class="headline-item">' +
              '<div class="headline-num">' + (i + 1) + '</div>' +
              '<div class="headline-text">' + m + '</div>' +
            '</div>';
        });

        var topicsHtml = '';
        if (data.topicos && data.topicos.length > 0) {
          topicsHtml = '<div class="newsletter-topics">';
          data.topicos.forEach(function(t) {
            topicsHtml += '<span class="topic-tag">' + t + '</span>';
          });
          topicsHtml += '</div>';
        }

        var notionLink = '';
        if (data.notionUrl) {
          notionLink =
            '<div class="newsletter-footer">' +
              '<a class="newsletter-link" href="' + data.notionUrl + '" target="_blank" rel="noopener">' +
                'Ler completa ' + arrow +
              '</a>' +
            '</div>';
        }

        el.innerHTML =
          '<div class="newsletter-header">' +
            '<div class="newsletter-title">' +
              '<div class="newsletter-icon">📰</div>' +
              '<span class="newsletter-label">Newsletter do Dia</span>' +
            '</div>' +
            '<div class="newsletter-date">' + dataFormatada + '</div>' +
          '</div>' +
          '<div class="newsletter-headlines">' + headlinesHtml + '</div>' +
          topicsHtml +
          notionLink;
      })
      .catch(function() {
        el.style.display = 'none';
      });
  })();
</script>

</body>
</html>
