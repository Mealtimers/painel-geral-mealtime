<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Meal Time</title>
  <link rel="icon" href="https://www.mealtime.com.br/mealtime/logo-avatar-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --mt-red: #BC2026;
      --mt-red-hover: #d42a30;
      --mt-red-soft: rgba(188,32,38,0.10);
      --mt-dark: #0c0d0f;
      --mt-panel: #141518;
      --mt-card: #1a1b1f;
      --border: rgba(255,255,255,0.06);
      --border-focus: rgba(188,32,38,0.4);
      --text-primary: #f0f0f0;
      --text-secondary: rgba(255,255,255,0.50);
      --text-tertiary: rgba(255,255,255,0.28);
      --green: #5CB85C;
      --r: 12px;
    }

    html, body {
      height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text-primary);
      background: var(--mt-dark);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 60% 50% at 50% 30%, rgba(188,32,38,0.06), transparent),
        var(--mt-dark);
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      animation: fadeUp 0.5s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo img {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(188,32,38,0.15);
    }

    .login-logo h1 {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--mt-red), #e04b4b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 4px;
    }

    .login-logo p {
      font-size: 0.76rem;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .login-card {
      background: var(--mt-card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px 24px;
    }

    .login-card h2 {
      font-size: 0.92rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .login-card .subtitle {
      font-size: 0.72rem;
      color: var(--text-tertiary);
      margin-bottom: 22px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      letter-spacing: 0.03em;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      outline: none;
      transition: all 0.2s;
    }

    .field input:focus {
      border-color: var(--border-focus);
      background: rgba(188,32,38,0.03);
      box-shadow: 0 0 0 3px rgba(188,32,38,0.08);
    }

    .field input::placeholder {
      color: var(--text-tertiary);
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: var(--mt-red);
      color: white;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .btn:hover {
      background: var(--mt-red-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(188,32,38,0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.04);
      border-color: rgba(255,255,255,0.12);
      box-shadow: none;
      transform: none;
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-tertiary);
      cursor: pointer;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--mt-red);
    }

    .error-msg {
      background: rgba(188,32,38,0.08);
      border: 1px solid rgba(188,32,38,0.2);
      color: #e85d5d;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.4s ease;
    }

    .success-msg {
      background: rgba(92,184,92,0.08);
      border: 1px solid rgba(92,184,92,0.2);
      color: var(--green);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .step { display: none; }
    .step.active { display: block; }

    .back-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      cursor: pointer;
      color: var(--text-tertiary);
      font-size: 0.7rem;
      font-weight: 600;
      transition: color 0.2s;
    }

    .back-row:hover { color: var(--text-primary); }

    .back-row svg {
      width: 14px; height: 14px;
    }

    .code-input {
      text-align: center;
      letter-spacing: 10px;
      font-size: 1.5rem;
      font-weight: 800;
      font-family: monospace;
    }

    .email-hint {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-tertiary);
      margin-bottom: 18px;
      line-height: 1.5;
    }

    .email-hint strong {
      color: var(--text-secondary);
    }

    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 0.62rem;
      color: var(--text-tertiary);
      letter-spacing: 0.06em;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 42px;
    }

    .toggle-pass {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      transition: color 0.2s;
    }

    .toggle-pass:hover {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

<div class="login-wrapper">

  <div class="login-logo">
    <img src="https://www.mealtime.com.br/mealtime/logo-avatar-192.png" alt="Meal Time">
    <h1>Meal Time</h1>
    <p>Painel Geral</p>
  </div>

  <div class="login-card">

    <!-- STEP 1: LOGIN -->
    <div class="step active" id="stepLogin">
      <h2>Entrar</h2>
      <p class="subtitle">Acesse o painel com suas credenciais</p>

      <div class="error-msg" id="loginError"></div>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="username" placeholder="Seu usuario" autocomplete="username" required autofocus>
        </div>
        <div class="field">
          <label for="senha">Senha</label>
          <div class="password-wrapper">
            <input type="password" id="senha" name="password" placeholder="Sua senha" autocomplete="current-password" required>
            <button type="button" class="toggle-pass" onclick="togglePassword('senha', this)" tabindex="-1">
              <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn" id="loginBtn">Entrar</button>
      </form>

      <a class="forgot-link" onclick="showStep('stepRecover')">Esqueci minha senha</a>
    </div>

    <!-- STEP 2: RECOVER — email -->
    <div class="step" id="stepRecover">
      <div class="back-row" onclick="showStep('stepLogin')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Voltar ao login
      </div>

      <h2>Recuperar senha</h2>
      <p class="subtitle">Informe seu email cadastrado para receber o codigo</p>

      <div class="error-msg" id="recoverError"></div>
      <div class="success-msg" id="recoverSuccess"></div>

      <form id="recoverForm">
        <div class="field">
          <label for="recoverEmail">Email</label>
          <input type="email" id="recoverEmail" placeholder="seu@email.com" required>
        </div>
        <button type="submit" class="btn" id="recoverBtn">Enviar codigo</button>
      </form>
    </div>

    <!-- STEP 3: CODE verification -->
    <div class="step" id="stepCode">
      <div class="back-row" onclick="showStep('stepRecover')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Voltar
      </div>

      <h2>Verificar codigo</h2>
      <p class="email-hint">Enviamos um codigo de 6 digitos para<br><strong id="sentEmail"></strong></p>

      <div class="error-msg" id="codeError"></div>

      <form id="codeForm">
        <div class="field">
          <label for="resetCode">Codigo</label>
          <input type="text" id="resetCode" class="code-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" required>
        </div>
        <div class="field">
          <label for="novaSenha">Nova senha</label>
          <div class="password-wrapper">
            <input type="password" id="novaSenha" placeholder="Sua nova senha" minlength="4" required>
            <button type="button" class="toggle-pass" onclick="togglePassword('novaSenha', this)" tabindex="-1">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn" id="codeBtn">Redefinir senha</button>
      </form>
    </div>

  </div>

  <div class="footer">Meal Time &copy; 2026</div>

</div>

<script>
  function showStep(id) {
    document.querySelectorAll('.step').forEach(function(s) { s.classList.remove('active'); });
    document.getElementById(id).classList.add('active');
    // Clear errors
    document.querySelectorAll('.error-msg, .success-msg').forEach(function(e) { e.style.display = 'none'; });
  }

  function showError(elId, msg) {
    var el = document.getElementById(elId);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function showSuccess(elId, msg) {
    var el = document.getElementById(elId);
    el.textContent = msg;
    el.style.display = 'block';
  }

  function togglePassword(inputId, btn) {
    var inp = document.getElementById(inputId);
    if (inp.type === 'password') {
      inp.type = 'text';
      btn.style.color = 'var(--mt-red)';
    } else {
      inp.type = 'password';
      btn.style.color = 'var(--text-tertiary)';
    }
  }

  function setLoading(btnId, loading) {
    var btn = document.getElementById(btnId);
    if (loading) {
      btn.dataset.originalText = btn.textContent;
      btn.innerHTML = '<span class="spinner"></span>Aguarde...';
      btn.disabled = true;
    } else {
      btn.textContent = btn.dataset.originalText || 'Enviar';
      btn.disabled = false;
    }
  }

  // ── LOGIN ──
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var usuario = document.getElementById('usuario').value.trim();
    var senha = document.getElementById('senha').value;

    if (!usuario || !senha) return showError('loginError', 'Preencha todos os campos');

    setLoading('loginBtn', true);
    document.getElementById('loginError').style.display = 'none';

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ usuario: usuario, senha: senha })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      setLoading('loginBtn', false);
      if (d.ok && d.token) {
        localStorage.setItem('painel_token', d.token);
        document.cookie = 'painel_token=' + d.token + '; path=/; max-age=' + (24*60*60) + '; SameSite=Lax';
        window.location.href = '/';
      } else {
        showError('loginError', d.error || 'Erro ao fazer login');
      }
    })
    .catch(function() {
      setLoading('loginBtn', false);
      showError('loginError', 'Erro de conexao. Tente novamente.');
    });
  });

  // ── RECOVER ──
  document.getElementById('recoverForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var email = document.getElementById('recoverEmail').value.trim();

    if (!email) return showError('recoverError', 'Informe seu email');

    setLoading('recoverBtn', true);
    document.getElementById('recoverError').style.display = 'none';

    fetch('/api/auth/recover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      setLoading('recoverBtn', false);
      if (d.ok) {
        // Mascarar email
        var parts = email.split('@');
        var masked = parts[0].substring(0, 3) + '***@' + parts[1];
        document.getElementById('sentEmail').textContent = masked;
        showStep('stepCode');
      } else {
        showError('recoverError', d.error || 'Erro ao enviar');
      }
    })
    .catch(function() {
      setLoading('recoverBtn', false);
      showError('recoverError', 'Erro de conexao. Tente novamente.');
    });
  });

  // ── CODE + RESET ──
  document.getElementById('codeForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var code = document.getElementById('resetCode').value.trim();
    var novaSenha = document.getElementById('novaSenha').value;

    if (!code || code.length !== 6) return showError('codeError', 'Informe o codigo de 6 digitos');
    if (!novaSenha || novaSenha.length < 4) return showError('codeError', 'A senha deve ter pelo menos 4 caracteres');

    setLoading('codeBtn', true);
    document.getElementById('codeError').style.display = 'none';

    fetch('/api/auth/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code, novaSenha: novaSenha })
    })
    .then(function(r) { return r.json(); })
    .then(function(d) {
      setLoading('codeBtn', false);
      if (d.ok && d.token) {
        localStorage.setItem('painel_token', d.token);
        document.cookie = 'painel_token=' + d.token + '; path=/; max-age=' + (24*60*60) + '; SameSite=Lax';
        window.location.href = '/';
      } else {
        showError('codeError', d.error || 'Codigo invalido');
      }
    })
    .catch(function() {
      setLoading('codeBtn', false);
      showError('codeError', 'Erro de conexao. Tente novamente.');
    });
  });

  // ── Auto-redirect if already logged ──
  (function() {
    var token = localStorage.getItem('painel_token');
    if (token) {
      fetch('/api/auth/verify', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d.authenticated) {
          document.cookie = 'painel_token=' + token + '; path=/; max-age=' + (24*60*60) + '; SameSite=Lax';
          window.location.href = '/';
        }
      })
      .catch(function() {});
    }
  })();
</script>

</body>
</html>
